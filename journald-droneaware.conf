# DroneAware — make the systemd journal persistent but bounded.
#
# Storage=persistent makes journald create and use /var/log/journal, so logs
# survive reboots. The size caps keep it from ever filling the SD card.
#
# Install:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp journald-droneaware.conf /etc/systemd/journald.conf.d/
#   sudo systemctl restart systemd-journald

[Journal]
Storage=persistent
SystemMaxUse=50M
SystemMaxFileSize=10M
